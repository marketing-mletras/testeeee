<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Letras com Gravidade</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #stage { position: fixed; inset: 0; background: #000; }
  canvas { display: block; background: #000; }

  #start-overlay {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px;
    z-index: 20;
    transition: opacity .45s ease;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
  #start-overlay .title {
    color: #fff; font-size: 15px; letter-spacing: .04em; opacity: .55;
    text-transform: uppercase; font-weight: 600;
  }
  #start-btn {
    appearance: none; border: 1.5px solid #fff; background: transparent; color: #fff;
    padding: 16px 34px; border-radius: 999px; font-size: 16px; font-weight: 600;
    letter-spacing: .01em;
  }
  #start-btn:active { background: #fff; color: #000; }

  #hint {
    position: fixed; left: 50%; bottom: 86px; transform: translateX(-50%);
    color: rgba(255,255,255,.55); font-size: 13px; letter-spacing: .03em;
    z-index: 5; opacity: 0; transition: opacity .5s ease; pointer-events: none;
    text-align: center; width: 100%;
  }
  #hint.show { opacity: 1; }

  #toolbar {
    position: fixed; left: 0; right: 0; bottom: 22px;
    display: flex; justify-content: center; gap: 14px;
    z-index: 5; opacity: 0; transition: opacity .4s ease;
  }
  #toolbar.show { opacity: 1; }
  .tbtn {
    appearance: none; border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.06);
    color: #fff; width: 46px; height: 46px; border-radius: 50%;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .tbtn:active { background: rgba(255,255,255,.22); }
</style>
</head>
<body>

<div id="stage"><canvas id="canvas"></canvas></div>

<div id="hint">incline o celular</div>

<div id="toolbar">
  <button class="tbtn" id="btn-reset" title="reiniciar">&#8635;</button>
  <button class="tbtn" id="btn-invert" title="inverter gravidade">&#8645;</button>
</div>

<div id="start-overlay">
  <div class="title">letras com gravidade</div>
  <button id="start-btn">tocar para começar</button>
</div>

    { id: "h", w: 70, h: 109,
      hull: [[0,0],[22.34,0],[61.99,38.03],[62.65,38.67],[63.28,39.35],[63.88,40.05],[64.45,40.77],[65,41.53],[65.51,42.31],[66,43.12],[66.46,43.96],[66.89,44.83],[67.29,45.71],[67.67,46.62],[68.02,47.55],[68.34,48.5],[68.63,49.46],[68.89,50.45],[69.11,51.45],[69.31,52.48],[69.48,53.52],[69.61,54.59],[69.72,55.67],[69.79,56.77],[69.84,57.9],[69.85,59.04],[69.85,108.88],[0,108.88]],
      d: "M0 108.883V0H22.3422V39.8059H26.443L18.8777 47.6539C19.7262 44.0716 21.423 41.1021 23.9684 38.7453C26.5608 36.3885 29.601 34.621 33.0891 33.4426C36.6242 32.2642 40.3008 31.675 44.1188 31.675C49.7279 31.675 54.4414 32.8534 58.2594 35.2102C62.0773 37.5198 64.9526 40.725 66.8852 44.8258C68.8648 48.9266 69.8547 53.6637 69.8547 59.0371V108.883H47.5125V63.9156C47.5125 59.2964 46.4048 55.8555 44.1895 53.593C42.0212 51.3305 39.0988 50.1992 35.4223 50.1992C32.9712 50.1992 30.7559 50.7413 28.7762 51.8254C26.8436 52.8624 25.2882 54.4178 24.1098 56.4918C22.9314 58.5186 22.3422 61.0639 22.3422 64.1277V108.883H0Z" }
  ];

  function svgDataUri(d, w, h) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h +
      '" viewBox="0 0 ' + w + ' ' + h + '"><path d="' + d + '" fill="#ffffff"/></svg>';
    return "data:image/svg+xml;base64," + btoa(svg);
  }

  // ---------- Matter.js setup ----------
  var Engine = Matter.Engine, World = Matter.World, Bodies = Matter.Bodies,
      Body = Matter.Body, Vertices = Matter.Vertices, Composite = Matter.Composite,
      Mouse = Matter.Mouse, MouseConstraint = Matter.MouseConstraint, Events = Matter.Events;

  var engine = Engine.create();
  engine.gravity.y = 1;
  engine.gravity.scale = 0.001;
  var world = engine.world;

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  var DPR = Math.min(window.devicePixelRatio || 1, 2.5);

  // O limite do "mundo" físico é SEMPRE o tamanho real da tela/janela,
  // ponto. Sem caixa fixa, sem letterbox — 100% de largura e altura,
  // em qualquer aparelho.
  // window.innerWidth/innerHeight ("layout viewport") pode ser diferente
  // da área que aparece de fato na tela do celular ("visual viewport"),
  // por causa da barra de endereço dinâmica do Safari/Chrome mobile.
  // visualViewport reflete a área REALMENTE visível — é isso que define
  // os limites do mundo físico, não o innerWidth/innerHeight.
  function viewportSize() {
    if (window.visualViewport) {
      return { w: window.visualViewport.width, h: window.visualViewport.height };
    }
    return { w: window.innerWidth, h: window.innerHeight };
  }

  function resizeCanvas() {
    var v = viewportSize();
    canvas.width = v.w * DPR;
    canvas.height = v.h * DPR;
    canvas.style.width = v.w + "px";
    canvas.style.height = v.h + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  var WALL_T = 140;
  var walls = [];
  function setupWalls() {
    if (walls.length) Composite.remove(world, walls);
    var v = viewportSize();
    walls = [
      Bodies.rectangle(v.w / 2, -WALL_T / 2, v.w + WALL_T * 2, WALL_T, { isStatic: true, restitution: 0.5 }),
      Bodies.rectangle(v.w / 2, v.h + WALL_T / 2, v.w + WALL_T * 2, WALL_T, { isStatic: true, restitution: 0.5 }),
      Bodies.rectangle(-WALL_T / 2, v.h / 2, WALL_T, v.h + WALL_T * 2, { isStatic: true, restitution: 0.5 }),
      Bodies.rectangle(v.w + WALL_T / 2, v.h / 2, WALL_T, v.h + WALL_T * 2, { isStatic: true, restitution: 0.5 })
    ];
    Composite.add(world, walls);
  }

  // Garante que NENHUMA letra fique fora da tela depois que a janela
  // muda de tamanho (resize, rotação de tela, teclado abrindo, etc).
  // As paredes são recriadas no lugar novo, mas um corpo que já estava
  // perto da borda antiga pode ficar "para fora" da borda nova até a
  // física resolver — aqui a gente força a posição de volta pra dentro
  // na hora, sem esperar a física empurrar.
  function keepLettersInsideViewport() {
    var v = viewportSize();
    items.forEach(function (it) {
      var b = it.body;
      var halfW = (b.bounds.max.x - b.bounds.min.x) / 2;
      var halfH = (b.bounds.max.y - b.bounds.min.y) / 2;
      var minX = Math.min(halfW, v.w / 2), maxX = Math.max(v.w - halfW, v.w / 2);
      var minY = Math.min(halfH, v.h / 2), maxY = Math.max(v.h - halfH, v.h / 2);
      var x = Math.min(Math.max(b.position.x, minX), maxX);
      var y = Math.min(Math.max(b.position.y, minY), maxY);
      if (x !== b.position.x || y !== b.position.y) {
        Body.setPosition(b, { x: x, y: y });
        Body.setVelocity(b, { x: b.velocity.x * 0.3, y: b.velocity.y * 0.3 });
      }
    });
  }

  // ---------- Build letter bodies ----------
  var glyphs = [];   // { hull, centre, img, w, h }
  var items = [];    // { body, glyph }

  function prepareGlyphs(scale) {
    glyphs = LETTERS.map(function (L) {
      var hull = L.hull.map(function (p) { return { x: p[0] * scale, y: p[1] * scale }; });
      if (hull.length < 3) {
        showDebug("Aviso: contorno da letra '" + L.id + "' veio vazio.");
      }
      var centre = Vertices.centre(hull);
      var img = new Image();
      img.onerror = function () {
        showDebug("Falha ao carregar imagem da letra '" + L.id + "'");
      };
      img.src = svgDataUri(L.d, L.w, L.h);
      return { id: L.id, hull: hull, centre: centre, img: img, w: L.w * scale, h: L.h * scale };
    });
  }

  function spawnLetters() {
    if (items.length) Composite.remove(world, items.map(function (it) { return it.body; }));
    items = [];
    var v = viewportSize();
    glyphs.forEach(function (g, idx) {
      // As letras nascem JÁ DENTRO da caixa (perto do topo), não acima
      // de uma parede fechada — senão ficam presas por fora, sem cair.
      var x = v.w * (0.12 + 0.76 * (idx / (glyphs.length - 1 || 1)) + (Math.random() - 0.5) * 0.06);
      var y = Math.min(40 + idx * 26 + Math.random() * 30, v.h * 0.4);
      var body;
      try {
        if (g.hull.length < 3) throw new Error("hull vazio");
        body = Bodies.fromVertices(x, y, [g.hull], {
          restitution: 0.72,
          friction: 0.15,
          frictionAir: 0.006,
          density: 0.0022,
          slop: 0.02
        }, true);
      } catch (bodyErr) {
        showDebug("Letra '" + g.id + "' usando forma simplificada (" + bodyErr.message + ")");
        body = Bodies.circle(x, y, Math.max(g.w, g.h) / 2.6, {
          restitution: 0.72, friction: 0.15, frictionAir: 0.006, density: 0.0022
        });
      }
      Body.setAngle(body, (Math.random() - 0.5) * 1.0);
      Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.12);
      Composite.add(world, body);
      items.push({ body: body, glyph: g });
    });
  }

  // ---------- Render loop ----------
  var statsEl = null;
  function ensureStatsEl() {
    if (statsEl) return statsEl;
    statsEl = document.createElement("div");
    statsEl.id = "stats-box";
    statsEl.style.position = "fixed";
    statsEl.style.left = "10px";
    statsEl.style.top = "10px";
    statsEl.style.color = "rgba(255,255,255,.55)";
    statsEl.style.fontSize = "11px";
    statsEl.style.fontFamily = "monospace";
    statsEl.style.zIndex = "998";
    statsEl.style.whiteSpace = "pre";
    statsEl.style.pointerEvents = "none";
    document.body.appendChild(statsEl);
    return statsEl;
  }

  var frameCount = 0;
  function render() {
    var v = viewportSize();
    ctx.clearRect(0, 0, v.w, v.h);
    var imgsOk = 0;
    items.forEach(function (it) {
      var b = it.body, g = it.glyph;
      // ponto garantido: sempre desenha algo, mesmo se a imagem falhar
      ctx.beginPath();
      ctx.arc(b.position.x, b.position.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      if (g.img.complete && g.img.naturalWidth > 0) {
        imgsOk++;
        try {
          ctx.save();
          ctx.translate(b.position.x, b.position.y);
          ctx.rotate(b.angle);
          ctx.drawImage(g.img, -g.centre.x, -g.centre.y, g.w, g.h);
          ctx.restore();
        } catch (drawErr) {
          showDebug("Erro ao desenhar imagem: " + drawErr.message);
        }
      }
    });
    ensureStatsEl().textContent =
      "letras: " + items.length +
      " | imgs ok: " + imgsOk + "/" + glyphs.length +
      " | frame: " + frameCount +
      " | g: (" + engine.gravity.x.toFixed(2) + ", " + engine.gravity.y.toFixed(2) + ")" +
      (items[0] ? " | corpo0: (" + items[0].body.position.x.toFixed(0) + "," + items[0].body.position.y.toFixed(0) + ")" : "");
  }

  var lastTime = null;
  var loopStopped = false;
  function loop(t) {
    if (loopStopped) return;
    try {
      if (lastTime == null) lastTime = t;
      var dt = Math.min(t - lastTime, 1000 / 30);
      lastTime = t;
      frameCount++;
      Engine.update(engine, dt);
      render();
      requestAnimationFrame(loop);
    } catch (loopErr) {
      loopStopped = true;
      showDebug("Erro no loop (frame " + frameCount + "): " + loopErr.message);
    }
  }

  // ---------- Mouse / touch dragging ----------
  function setupMouse() {
    var mouse = Mouse.create(canvas);
    mouse.pixelRatio = 1;
    var constraint = MouseConstraint.create(engine, {
      mouse: mouse,
      constraint: { stiffness: 0.55, damping: 0.15, render: { visible: false } }
    });
    Composite.add(world, constraint);
  }

  // ---------- Device tilt -> gravity ----------
  var invert = 1;
  var targetGX = 0, targetGY = 1;

  function applyGravitySmooth() {
    engine.gravity.x += (targetGX - engine.gravity.x) * 0.12;
    engine.gravity.y += (targetGY - engine.gravity.y) * 0.12;
  }
  setInterval(applyGravitySmooth, 16);

  function rotateForOrientation(gx, gy) {
    var angle = 0;
    if (screen.orientation && typeof screen.orientation.angle === "number") {
      angle = screen.orientation.angle;
    } else if (typeof window.orientation === "number") {
      angle = window.orientation;
    }
    if (angle === 90) { var t = gx; gx = -gy; gy = t; }
    else if (angle === -90 || angle === 270) { var t2 = gx; gx = gy; gy = -t2; }
    else if (angle === 180) { gx = -gx; gy = -gy; }
    return [gx, gy];
  }

  function onMotion(e) {
    var acc = e.accelerationIncludingGravity;
    if (!acc || (acc.x === null && acc.y === null)) return;
    var gx = acc.x || 0;
    var gy = -(acc.y || 0);
    var rotated = rotateForOrientation(gx, gy);
    targetGX = invert * (rotated[0] / 9.81) * 1.4;
    targetGY = invert * (rotated[1] / 9.81) * 1.4;
  }

  var motionActive = false;
  function enableMotion() {
    if (motionActive) return;
    if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
      DeviceMotionEvent.requestPermission().then(function (state) {
        if (state === "granted") {
          window.addEventListener("devicemotion", onMotion);
          motionActive = true;
        }
      }).catch(function () {});
    } else if (typeof DeviceMotionEvent !== "undefined") {
      window.addEventListener("devicemotion", onMotion);
      motionActive = true;
    }
  }

  // ---------- Boot ----------
  function showDebug(msg) {
    var el = document.getElementById("debug-box");
    if (!el) {
      el = document.createElement("div");
      el.id = "debug-box";
      el.style.position = "fixed";
      el.style.left = "12px";
      el.style.right = "12px";
      el.style.bottom = "12px";
      el.style.background = "rgba(200,0,0,.92)";
      el.style.color = "#fff";
      el.style.padding = "10px 14px";
      el.style.borderRadius = "10px";
      el.style.fontSize = "12px";
      el.style.zIndex = "999";
      el.style.fontFamily = "monospace";
      el.style.whiteSpace = "pre-wrap";
      document.body.appendChild(el);
    }
    el.textContent = msg;
  }

  window.addEventListener("error", function (e) {
    showDebug("Erro: " + (e.message || e.error || "desconhecido"));
  });

  function boot() {
    resizeCanvas();
    setupWalls();
    var v = viewportSize();
    var baseScale = Math.min(v.w, v.h) / 10 / 80;
    prepareGlyphs(Math.max(1.1, Math.min(2.2, baseScale)));
    spawnLetters();
    setupMouse();
    requestAnimationFrame(loop);
  }

  var resizeDebounce = null;
  function handleViewportChange(delay) {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(function () {
      resizeCanvas();
      setupWalls();
      keepLettersInsideViewport();
    }, delay || 120);
  }

  window.addEventListener("resize", function () { handleViewportChange(120); });
  window.addEventListener("orientationchange", function () { handleViewportChange(250); });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", function () { handleViewportChange(80); });
  }

  document.getElementById("start-btn").addEventListener("click", function () {
    enableMotion();
    document.getElementById("start-overlay").classList.add("hidden");
    var hint = document.getElementById("hint");
    var toolbar = document.getElementById("toolbar");
    hint.classList.add("show");
    toolbar.classList.add("show");
    setTimeout(function () { hint.classList.remove("show"); }, 3800);
  });

  document.getElementById("btn-reset").addEventListener("click", function () {
    spawnLetters();
  });

  document.getElementById("btn-invert").addEventListener("click", function (e) {
    invert *= -1;
    e.currentTarget.style.background = invert === -1 ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.06)";
  });

  try {
    boot();
  } catch (err) {
    showDebug("Erro ao iniciar: " + err.message);
  }
})();
</script>
